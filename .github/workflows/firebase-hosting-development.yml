name: Deploy to Firebase Hosting — Development (main)

# Every push to `main` deploys the latest development build to the
# development Hosting site: https://jifunze-7dbfe.web.app
on:
  push:
    branches: [main]

concurrency:
  group: firebase-deploy-development
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JIFUNZE_7DBFE }}
          channelId: live
          projectId: jifunze-7dbfe
          target: development
