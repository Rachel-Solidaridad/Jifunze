# NOTE: Cloud Build pipeline is NOT actively used. Production deploys go through
# Firebase Hosting via .github/workflows/firebase-hosting-merge.yml. Kept as a
# fallback only; not actively maintained.

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/jifunze:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/jifunze:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/jifunze']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jifunze'
      - '--image=gcr.io/$PROJECT_ID/jifunze:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

images:
  - 'gcr.io/$PROJECT_ID/jifunze:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/jifunze:latest'

options:
  logging: CLOUD_LOGGING_ONLY
