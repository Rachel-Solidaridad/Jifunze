<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jifunze — Solidaridad ECA Learning Hub. Change that matters." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Jifunze | Solidaridad ECA Learning Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Brush+Script+MT&display=swap" rel="stylesheet">
    <style>
      /* Instant branded splash shown while the app bundle downloads. React
         replaces #root on mount, so this disappears automatically. */
      #boot {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #000;
        font-family: 'Open Sans', system-ui, sans-serif; gap: 20px;
      }
      #boot .word { font-weight: 800; font-size: 38px; color: #fff; letter-spacing: -0.5px; }
      #boot .bars { display: flex; align-items: flex-end; gap: 6px; height: 30px; }
      #boot .bars i { width: 8px; height: 100%; border-radius: 9999px; background: #FFC800;
        transform-origin: bottom; animation: bootgrow 1.1s ease-in-out infinite; }
      #boot .bars i:nth-child(2){ animation-delay: .13s } #boot .bars i:nth-child(3){ animation-delay: .26s }
      #boot .bars i:nth-child(4){ animation-delay: .39s } #boot .bars i:nth-child(5){ animation-delay: .52s }
      #boot .tag { font-size: 12px; letter-spacing: 4px; color: #8a8a8a; text-transform: uppercase; }
      @keyframes bootgrow { 0%,100%{ transform: scaleY(.35); opacity:.45 } 50%{ transform: scaleY(1); opacity:1 } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <svg width="64" height="64" viewBox="0 0 36 36" fill="none" aria-hidden="true">
          <path d="M4 8 Q 4 6, 6 6 L 16 6 Q 18 6, 18 8 L 18 30 L 6 30 Q 4 30, 4 28 Z" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M32 8 Q 32 6, 30 6 L 20 6 Q 18 6, 18 8 L 18 30 L 30 30 Q 32 30, 32 28 Z" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M8 12 L 14 12 M 8 16 L 14 16 M 8 20 L 14 20" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
          <path d="M22 12 L 28 12 M 22 16 L 28 16 M 22 20 L 28 20" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="word">Jifunze</div>
        <div class="bars"><i></i><i></i><i></i><i></i><i></i></div>
        <div class="tag">Solidaridad ECA Learning Hub</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
