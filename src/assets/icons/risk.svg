<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#000" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- gauge arc (semicircle) -->
  <path d="M9 44 A 23 23 0 0 1 55 44"/>
  <!-- tick marks -->
  <line x1="9" y1="44" x2="13.5" y2="44"/>
  <line x1="14.8" y1="27.5" x2="18" y2="30.7"/>
  <line x1="32" y1="21" x2="32" y2="25.5"/>
  <line x1="49.2" y1="27.5" x2="46" y2="30.7"/>
  <line x1="55" y1="44" x2="50.5" y2="44"/>
  <!-- needle pointing to the high zone -->
  <line x1="32" y1="44" x2="45" y2="30" stroke-width="3.6"/>
  <!-- hub -->
  <circle cx="32" cy="44" r="3.4" fill="#000" stroke="none"/>
  <!-- base / stand -->
  <line x1="22" y1="52" x2="42" y2="52" stroke-width="3.4"/>
  <line x1="32" y1="44" x2="32" y2="52"/>
</svg>
