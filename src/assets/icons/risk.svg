<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ground line -->
  <rect x="3" y="52" width="40" height="3" rx="1.5" fill="#000"/>
  <!-- domino 1: falling, leaning right -->
  <rect x="5" y="33" width="6.5" height="19" rx="1.5" fill="#000" transform="rotate(32 8.2 51.5)"/>
  <!-- domino 2: leaning into the next -->
  <rect x="17" y="33" width="6.5" height="19" rx="1.5" fill="#000" transform="rotate(15 20.2 51.5)"/>
  <!-- domino 3: still upright (held) -->
  <rect x="30" y="33" width="6.5" height="19" rx="1.5" fill="#000"/>
  <!-- open hand stopping the fall -->
  <g fill="#000">
    <rect x="44" y="38" width="15" height="16" rx="4.5"/>
    <rect x="45" y="29" width="3" height="12" rx="1.5"/>
    <rect x="49" y="27" width="3" height="14" rx="1.5"/>
    <rect x="53" y="27" width="3" height="14" rx="1.5"/>
    <rect x="57" y="29.5" width="3" height="11" rx="1.5"/>
    <rect x="40.5" y="41" width="7" height="3.6" rx="1.8" transform="rotate(-28 47 43)"/>
  </g>
</svg>
